<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>测测最适合你住的城市</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            background: #1a1a1a;
            touch-action: pan-y;
        }

        /* 移动端全屏容器 */
        .app-container {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
            background: #F5F0E8;
        }

        /* 桌面端保持9:16比例 */
        @media (min-width: 500px) {
            .app-container {
                width: 450px;
                height: 800px;
                max-width: 56.25vh;
                max-height: 100vh;
                border-radius: 20px;
                box-shadow: 0 0 40px rgba(0,0,0,0.3);
                margin: auto;
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
            }
        }

        /* 页面容器 */
        .page-container {
            width: 100%;
            height: 100%;
            position: relative;
        }

        /* 单个页面 */
        .page {
            position: absolute;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            overflow-y: auto;
            overflow-x: hidden;
            background: #F5F0E8;
            -webkit-overflow-scrolling: touch;
        }

        .page.active {
            display: flex;
        }

        /* 起始页 */
        .start-page {
            justify-content: center;
            align-items: center;
        }

        .bg-collage {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            z-index: 0;
        }

        .bg-item {
            width: 100%;
            height: 100%;
            position: relative;
            overflow: hidden;
        }

        .bg-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .bg-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(255,200,100,0.3), rgba(255,150,100,0.2));
            animation: shimmer 3s ease-in-out infinite;
        }

        @keyframes shimmer {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.6; }
        }

        .start-content {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 20px;
        }

        .main-title {
            font-size: 28px;
            font-weight: bold;
            color: #2C3E50;
            text-shadow: 2px 2px 4px rgba(255,255,255,0.8);
            margin-bottom: 15px;
            line-height: 1.3;
        }

        @media (max-width: 380px) {
            .main-title {
                font-size: 24px;
            }
        }

        .subtitle {
            font-size: 16px;
            color: #34495E;
            margin-bottom: 45px;
            text-shadow: 1px 1px 2px rgba(255,255,255,0.8);
        }

        .start-btn {
            padding: 16px 56px;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
        }

        .start-btn:active {
            transform: scale(0.95);
            box-shadow: 0 4px 15px rgba(255,107,107,0.3);
        }

        /* 题目页面 */
        .question-page {
            padding: 20px;
            padding-bottom: 100px;
        }

        .question-illustration {
            width: 100%;
            height: 35vw;
            max-height: 180px;
            border-radius: 16px;
            overflow: hidden;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFE5D9, #FFCAD4);
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
        }

        .illustration-icon {
            font-size: 70px;
        }

        @media (max-width: 380px) {
            .illustration-icon {
                font-size: 55px;
            }
        }

        .question-number {
            font-size: 14px;
            color: #FF8E53;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 18px;
            color: #2C3E50;
            font-weight: 600;
            line-height: 1.5;
            margin-bottom: 25px;
            text-align: left;
        }

        @media (max-width: 380px) {
            .question-text {
                font-size: 16px;
            }
        }

        .options-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            padding: 14px 18px;
            font-size: 15px;
            color: #34495E;
            background: #fff;
            border: 2px solid #E8DFD5;
            border-radius: 12px;
            cursor: pointer;
            text-align: left;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            line-height: 1.4;
            width: 100%;
        }

        @media (max-width: 380px) {
            .option-btn {
                padding: 12px 14px;
                font-size: 14px;
            }
        }

        .option-btn:active {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: #fff;
            border-color: #FF6B6B;
            transform: scale(0.98);
        }

        .option-btn.selected {
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            color: #fff;
            border-color: #FF6B6B;
        }

        .option-btn .option-label {
            font-weight: bold;
            margin-right: 8px;
        }

        /* 结果页面 */
        .result-page {
            justify-content: center;
            align-items: center;
            padding: 20px;
            padding-bottom: 100px;
        }

        .result-first-page {
            text-align: center;
        }

        .result-city-image {
            width: 100%;
            max-width: 300px;
            height: 45vw;
            max-height: 300px;
            border-radius: 24px;
            overflow: hidden;
            margin: 0 auto 25px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFE5D9, #FFCAD4);
        }

        .result-city-icon {
            font-size: 120px;
        }

        @media (max-width: 380px) {
            .result-city-icon {
                font-size: 90px;
            }
        }

        .result-subtitle {
            font-size: 16px;
            color: #7F8C8D;
            margin-bottom: 10px;
        }

        .result-city-name {
            font-size: 42px;
            font-weight: bold;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* 结果解读 */
        .result-detail-page {
            padding: 20px;
            padding-bottom: 100px;
        }

        .result-detail-title {
            font-size: 24px;
            font-weight: bold;
            color: #2C3E50;
            text-align: center;
            margin-bottom: 25px;
        }

        .result-detail-content {
            font-size: 15px;
            color: #34495E;
            line-height: 1.9;
            text-align: justify;
            padding: 22px;
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        @media (max-width: 380px) {
            .result-detail-content {
                font-size: 14px;
                padding: 16px;
            }
        }

        /* 重新测试按钮 */
        .restart-btn {
            display: block;
            width: 180px;
            margin: 35px auto 0;
            padding: 16px 35px;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(135deg, #FF6B6B, #FF8E53);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 6px 25px rgba(255,107,107,0.4);
            transition: all 0.3s ease;
        }

        .restart-btn:active {
            transform: scale(0.95);
        }

        /* 底部进度条 */
        .progress-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            height: 4px;
            background: linear-gradient(90deg, #FF6B6B, #FF8E53);
            transition: width 0.3s ease;
            z-index: 1000;
        }

        /* 页码指示器 */
        .page-indicator {
            position: fixed;
            bottom: 15px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: #999;
            z-index: 100;
        }

        /* 动画 */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .fade-in {
            animation: fadeIn 0.5s ease forwards;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .float {
            animation: float 3s ease-in-out infinite;
        }

        /* 结果第二页插图 */
        .final-illustration {
            width: 100%;
            height: 30vw;
            max-height: 160px;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #FFE5D9, #FFCAD4);
            box-shadow: 0 8px 25px rgba(0,0,0,0.1);
        }

        .final-icon {
            font-size: 80px;
        }

        /* 音乐控制 */
        .music-control {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,0.9);
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 3px 15px rgba(0,0,0,0.1);
            transition: all 0.3s ease;
        }

        .music-control:active {
            transform: scale(0.9);
        }

        .music-icon {
            font-size: 20px;
        }

        /* 底部安全区域 */
        .safe-area {
            height: 80px;
            flex-shrink: 0;
        }
    </style>
</head>

            const buttons = page.querySelectorAll('.option-btn');
            buttons.forEach(btn => {
                if (btn.dataset.option === option) {
                    btn.classList.add('selected');
                } else {
                    btn.classList.remove('selected');

                if (questionIndex < questions.length - 1) {
                    goToPage(questionIndex + 2); // +1题目页起始+1下一题

                    generateResultPages(resultCity);
                    goToPage(questions.length + 1);
                }
            }, 300);

        // 计算结果城市
        function calculateResult() {
            const scores = {};
            Object.keys(cities).forEach(city => scores[city] = 0);

            userAnswers.forEach((answer, index) => {
                if (optionCityTendency[index] && optionCityTendency[index][answer]) {
                    optionCityTendency[index][answer].forEach(city => {
                        if (scores[city] !== undefined) {
                            scores[city] += 1;
                        }
                    });
                }
            });

            let maxScore = 0;
            let resultCity = "成都";

            Object.entries(scores).forEach(([city, score]) => {
                if (score > maxScore) {
                    maxScore = score;
                    resultCity = city;
                }
            });

            return resultCity;
        }

            let targetPage = document.getElementById('page-' + pageIndex);

            // 如果找不到题目页，尝试结果页
            if (!targetPage && pageIndex === questions.length + 1) {
                targetPage = document.getElementById('page-result1');
            } else if (!targetPage && pageIndex === questions.length + 2) {
                targetPage = document.getElementById('page-result2');
            }

            if (targetPage) {
                targetPage.classList.add('active');
            }

            currentPage = pageIndex;
            updateUI();
        }

        // 更新UI
        function updateUI() {
            // 更新进度条
            const totalQuestions = questions.length;
            let progress = 0;

            if (currentPage === 0) {
                progress = 0;
            } else if (currentPage <= totalQuestions) {
                progress = (currentPage / totalQuestions) * 100;
            } else {
                progress = 100;
            }
            progressBar.style.width = progress + '%';

            // 更新页码
            if (currentPage === 0) {
                pageIndicator.textContent = '';
            } else if (currentPage <= totalQuestions) {
                pageIndicator.textContent = `${currentPage} / ${totalQuestions}`;
            } else {
                pageIndicator.textContent = '';
            }
        }

            // 显示起始页
            document.getElementById('page-0').classList.add('active');

            updateUI();
        }

        // 音乐控制
        musicControl.addEventListener('click', function() {
            if (isPlaying) {
                bgMusic.pause();
                musicIcon.textContent = '🔇';
            } else {
                bgMusic.play().catch(e => console.log('播放音乐失败:', e));
                musicIcon.textContent = '🔊';
            }
            isPlaying = !isPlaying;
        });

        // ============ 初始化 ============
        document.getElementById('btnStart').addEventListener('click', startTest);
    </script>
</body>
</html>
